<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Source International | Textile &amp; Chemical Industry Group — Karachi</title>
  <meta name="description" content="Source International is the parent company of SANMYRS, Source of Sublimation, and Raxer Sportswear — textile and chemical industry brands based in Karachi, Pakistan.">
  <meta property="og:title" content="Source International | Textile &amp; Chemical Industry Group">
  <meta property="og:description" content="Textile and chemical industry brands under one roof. Karachi, Pakistan.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="/og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="canonical" href="https://sourceinternational1.com/">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Source International",
    "url": "https://sourceinternational1.com",
    "address": { "@type": "PostalAddress", "addressLocality": "Karachi", "addressCountry": "PK" },
    "subOrganization": [
      { "@type": "Organization", "name": "SANMYRS", "url": "https://sanmyrs.com" },
      { "@type": "Organization", "name": "Source of Sublimation", "url": "https://sourceofsublimation.com" },
      { "@type": "Organization", "name": "Raxer Sportswear", "url": "https://raxersportswears.com" }
    ]
  }
  </script>
</head>
<body>

  <!-- Ambient blobs -->
  <div class="blobs" aria-hidden="true">
    <div class="blob blob-purple"></div>
    <div class="blob blob-red"></div>
    <div class="blob blob-teal"></div>
    <div class="blob blob-green"></div>
  </div>

  <main class="page">
    <div class="hero">

      <!-- Logo -->
      <div class="source-logo" data-aos="zoom-in">
        <img src="logos/source.png" alt="Source International Logo">
      </div>

      <!-- Eyebrow -->
      <p class="eyebrow" data-aos="fade-up" data-aos-delay="100">Karachi, Pakistan</p>

      <!-- Heading -->
      <h1 class="brand-name" data-aos="fade-up" data-aos-delay="200">
        Source<br>Inter&shy;national
      </h1>

      <!-- Tagline -->
      <p class="tagline" data-aos="fade-up" data-aos-delay="350">
        Textile &amp; chemical industry brands under one roof.
      </p>

      <!-- Divider -->
      <div class="divider" data-aos="fade-in" data-aos-delay="450" aria-hidden="true"></div>

      <!-- Cards label -->
      <p class="cards-label" data-aos="fade-up" data-aos-delay="500">Our Brands</p>

      <!-- Brand cards -->
      <div class="glass-cards">

        <a class="glass-card card-sanmyrs" href="https://sanmyrs.com" target="_blank" rel="noopener noreferrer"
           data-aos="fade-right" data-aos-delay="600">
          <div class="card-inner">
            <div class="card-logo">
              <img src="logos/sanmyrs.png" alt="SANMYRS">
            </div>
            <div class="card-meta">
              <span class="card-category">Textile Chemical &amp; Auxiliaries</span>
              <span class="card-title">SANMYRS</span>
            </div>
            <div class="card-arrow" aria-hidden="true">→</div>
          </div>
        </a>

        <a class="glass-card card-sos" href="https://sourceofsublimation.com" target="_blank" rel="noopener noreferrer"
           data-aos="fade-left" data-aos-delay="720">
          <div class="card-inner">
            <div class="card-logo card-logo--dark">
              <img src="logos/sos.png" alt="Source of Sublimation">
            </div>
            <div class="card-meta">
              <span class="card-category">Sublimation Printing</span>
              <span class="card-title">Source of Sublimation</span>
            </div>
            <div class="card-arrow" aria-hidden="true">→</div>
          </div>
        </a>

        <a class="glass-card card-raxer" href="https://raxersportswears.com" target="_blank" rel="noopener noreferrer"
           data-aos="fade-right" data-aos-delay="840">
          <div class="card-inner">
            <div class="card-logo">
              <img src="logos/raxer.png" alt="Raxer Sportswear">
            </div>
            <div class="card-meta">
              <span class="card-category">Sportswear</span>
              <span class="card-title">Raxer Sportswear</span>
            </div>
            <div class="card-arrow" aria-hidden="true">→</div>
          </div>
        </a>

      </div>
    </div>

    <footer class="footer" data-aos="fade-in" data-aos-delay="900">
      &copy; <span id="year"></span> Source International
    </footer>
  </main>

  <!-- Vercel Analytics & Speed Insights -->
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script>
    AOS.init({ once: true, easing: 'ease-out-cubic', duration: 600 });
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
